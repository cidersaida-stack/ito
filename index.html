<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인천 AI 여행비서 이지꾸 | 체험단 당첨자 발표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f472b6;
    --pink-light: #fbcfe8;
    --blue: #60a5fa;
    --blue-light: #bfdbfe;
    --sky: #7dd3fc;
    --purple: #a78bfa;
    --gold: #fbbf24;
    --white: #ffffff;
    --text-dark: #1e1b4b;
    --card-bg: rgba(255,255,255,0.85);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #bae6fd 0%, #e0abf5 35%, #fbcfe8 65%, #fde68a 100%);
    min-height: 100vh;
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* Animated background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .blob1 { width: 400px; height: 400px; background: #f9a8d4; top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 350px; height: 350px; background: #93c5fd; top: 30%; right: -80px; animation-delay: 2s; }
  .blob3 { width: 300px; height: 300px; background: #c4b5fd; bottom: 10%; left: 20%; animation-delay: 4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 36px 0 24px;
    animation: slideDown 0.7s ease both;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    border-radius: 50px;
    padding: 8px 16px;
    font-weight: 700;
    font-size: clamp(12px, 3.5vw, 15px);
    color: #2563eb;
    box-shadow: 0 4px 20px rgba(96,165,250,0.3);
    margin-bottom: 24px;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .logo-badge .ai-badge {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white;
    border-radius: 8px;
    padding: 2px 8px;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.5px;
  }

  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(28px, 6vw, 42px);
    line-height: 1.2;
    color: #1e1b4b;
    text-shadow: 0 2px 10px rgba(255,255,255,0.8);
    margin-bottom: 8px;
  }

  .header h1 .highlight {
    background: linear-gradient(135deg, #ec4899, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header .subtitle {
    font-size: 15px;
    color: #4c1d95;
    font-weight: 500;
    opacity: 0.85;
  }

  .confetti-row {
    font-size: 24px;
    letter-spacing: 4px;
    margin: 12px 0;
  }

  /* Search box */
  .search-card {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 24px 16px;
    box-shadow: 0 8px 40px rgba(139,92,246,0.18), 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 28px;
    border: 1.5px solid rgba(255,255,255,0.9);
    animation: fadeUp 0.7s 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .search-card h2 {
    font-size: 16px;
    font-weight: 700;
    color: #4c1d95;
    margin-bottom: 16px;
    text-align: center;
  }

  .search-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .search-input {
    width: 100%;
    min-width: 0;
    box-sizing: border-box;
    border: 2px solid #e9d5ff;
    border-radius: 16px;
    padding: 18px 8px;
    font-size: 30px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    letter-spacing: 16px;
    color: #3730a3;
    background: #faf5ff;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    -webkit-appearance: none;
    appearance: none;
  }

  .search-input:focus { border-color: #8b5cf6; background: white; }

  .search-input::placeholder {
    font-size: 14px;
    letter-spacing: 0;
    color: #c4b5fd;
    font-weight: 500;
  }

  .search-btn {
    background: linear-gradient(135deg, #ec4899, #8b5cf6);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(236,72,153,0.35);
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139,92,246,0.4); }
  .search-btn:active { transform: scale(0.98); }

  /* Search Result */
  .search-result {
    margin-top: 16px;
    border-radius: 16px;
    padding: 16px 20px;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    display: none;
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.9); opacity: 0; }
    60% { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-win-review {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 2px solid #f59e0b;
    color: #78350f;
  }

  .result-win-raffle {
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    border: 2px solid #8b5cf6;
    color: #4c1d95;
  }

  .result-none {
    background: #f1f5f9;
    border: 2px solid #e2e8f0;
    color: #64748b;
  }

  .result-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
  .result-prize { font-size: 18px; color: inherit; margin-top: 4px; }

  /* Winner sections */
  .section {
    animation: fadeUp 0.7s 0.4s ease both;
    margin-bottom: 20px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-icon {
    width: 48px; height: 48px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .icon-review { background: linear-gradient(135deg, #fef3c7, #fbbf24); }
  .icon-raffle { background: linear-gradient(135deg, #ede9fe, #8b5cf6); }

  .section-title-wrap { flex: 1; }

  .section-title {
    font-size: 18px;
    font-weight: 900;
    color: #1e1b4b;
  }

  .section-badge {
    display: inline-block;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 13px;
    font-weight: 700;
    margin-top: 4px;
  }

  .badge-review { background: #fef3c7; color: #92400e; }
  .badge-raffle { background: #ede9fe; color: #5b21b6; }

  /* Winner grid */
  .winner-card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(139,92,246,0.10), 0 1px 4px rgba(0,0,0,0.05);
    border: 1.5px solid rgba(255,255,255,0.9);
  }

  .winner-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  @media (max-width: 480px) {
    .winner-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  }
  @media (max-width: 340px) {
    .winner-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; }
  }

  .winner-item {
    background: #faf5ff;
    border: 1.5px solid #e9d5ff;
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
    transition: transform 0.15s, background 0.15s;
    cursor: default;
    min-width: 0;
  }

  .winner-item:hover { transform: translateY(-2px); background: #f3e8ff; border-color: #c4b5fd; }

  .winner-item.highlighted-review {
    background: linear-gradient(135deg, #fef3c7, #fde68a) !important;
    border-color: #f59e0b !important;
    box-shadow: 0 0 0 3px rgba(245,158,11,0.3);
    transform: scale(1.05);
  }

  .winner-item.highlighted-raffle {
    background: linear-gradient(135deg, #ede9fe, #c4b5fd) !important;
    border-color: #8b5cf6 !important;
    box-shadow: 0 0 0 3px rgba(139,92,246,0.3);
    transform: scale(1.05);
  }

  .winner-num {
    font-size: 10px;
    color: #a78bfa;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .winner-phone {
    font-size: 13px;
    font-weight: 900;
    color: #3730a3;
    letter-spacing: 1px;
    word-break: keep-all;
  }

  /* Footer */
  .footer-notice {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: center;
    margin-top: 24px;
    border: 1px solid rgba(255,255,255,0.8);
    animation: fadeUp 0.7s 0.6s ease both;
  }

  .footer-notice p {
    font-size: 14px;
    color: #6d28d9;
    font-weight: 500;
    line-height: 1.6;
  }

  .footer-notice .notice-icon { font-size: 20px; margin-bottom: 6px; }

  .org-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: rgba(76,29,149,0.6);
    font-weight: 500;
    animation: fadeUp 0.7s 0.8s ease both;
    padding-bottom: 20px;
  }

  /* Decorative floating elements */
  .deco {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    font-size: 32px;
    opacity: 0.12;
    animation: floatDeco 6s ease-in-out infinite;
  }
  .deco:nth-child(1) { top: 8%; left: 5%; animation-delay: 0s; }
  .deco:nth-child(2) { top: 20%; right: 8%; animation-delay: 1.5s; }
  .deco:nth-child(3) { bottom: 30%; left: 3%; animation-delay: 3s; }
  .deco:nth-child(4) { bottom: 15%; right: 5%; animation-delay: 4.5s; }

  @keyframes floatDeco {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(8deg); }
  }

  @media (max-width: 390px) {
    .container { padding: 0 12px 60px; }
    .search-card { padding: 20px 12px; border-radius: 20px; }
    .search-btn { font-size: 15px; padding: 14px; }
    .section-title { font-size: 16px; }
    .winner-card { padding: 14px 10px; }
  }
</style>
</head>
<body>

<div class="deco">✈️</div>
<div class="deco">🗺️</div>
<div class="deco">🧳</div>
<div class="deco">☕</div>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo-badge">
      <span class="ai-badge">AI</span>
      인천e지 &nbsp;·&nbsp; 인천 AI 여행비서 '이지꾸'
    </div>
    <div class="confetti-row">🎉🎊✨</div>
    <h1>체험단 이벤트<br><span class="highlight">당첨자 발표!</span></h1>
    <p class="subtitle" style="margin-top:12px;">설문조사 &amp; SNS 인증 이벤트 (3.6.~3.31.)</p>
  </div>

  <!-- Search -->
  <div class="search-card">
    <h2>📱 내 번호로 당첨 확인하기</h2>
    <div class="search-row">
      <input class="search-input" type="text" id="searchInput" maxlength="4" placeholder="전화번호 뒷 4자리 입력" inputmode="numeric" pattern="[0-9]*">
      <button class="search-btn" onclick="checkWinner()">확인 🔍</button>
    </div>
    <div class="search-result" id="searchResult"></div>
  </div>

  <!-- Review Winners (20명) -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon icon-review">🏆</div>
      <div class="section-title-wrap">
        <div class="section-title">성의 있는 리뷰 작성자</div>
        <span class="section-badge badge-review">20명 · 기프티콘 2만원권</span>
      </div>
    </div>
    <div class="winner-card">
      <div class="winner-grid" id="reviewGrid">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- Raffle Winners (50명) -->
  <div class="section" style="animation-delay:0.5s">
    <div class="section-header">
      <div class="section-icon icon-raffle">🎁</div>
      <div class="section-title-wrap">
        <div class="section-title">랜덤 추첨 당첨자</div>
        <span class="section-badge badge-raffle">50명 · 기프티콘 5천원권</span>
      </div>
    </div>
    <div class="winner-card">
      <div class="winner-grid" id="raffleGrid">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- Footer Notice -->
  <div class="footer-notice">
    <div class="notice-icon">📨</div>
    <p>기프티콘은 <strong>휴대전화 번호</strong>로 발송됩니다. <strong>(~4.20.)</strong></p>
    <p style="margin-top:6px; font-size:13px; color:#7c3aed; opacity:0.8;">당첨을 축하드립니다! 이지꾸를 사랑해 주셔서 감사합니다 💜</p>
  </div>


</div>

<script>
  const reviewWinners = [
    "0053","1226","0063","4092","4999","7649","2201","2387","0147","2846",
    "3373","0140","8407","7005","3381","7385","1471","0472","0122","2860"
  ];

  const raffleWinners = [
    "2178","7877","7777","4777","6212","4958","5115","7852","4317","5407",
    "7273","7803","0584","2240","9412","2847","1610","3026","6654","7759",
    "8399","5752","2193","4243","8617","8586","5710","7238","3768","7825",
    "3025","9816","2148","3048","3701","5125","5125","2663","7663","1415",
    "9753","6497","8715","0958","9919","7721","3172","7242","3972","2291"
  ];

  function buildGrid(containerId, winners, highlightClass) {
    const grid = document.getElementById(containerId);
    winners.forEach((num, i) => {
      const item = document.createElement('div');
      item.className = 'winner-item';
      item.dataset.phone = num;
      item.innerHTML = `<div class="winner-num">${String(i+1).padStart(2,'0')}</div><div class="winner-phone">${num}</div>`;
      grid.appendChild(item);
    });
  }

  buildGrid('reviewGrid', reviewWinners, 'highlighted-review');
  buildGrid('raffleGrid', raffleWinners, 'highlighted-raffle');

  function clearHighlights() {
    document.querySelectorAll('.winner-item').forEach(el => {
      el.classList.remove('highlighted-review', 'highlighted-raffle');
    });
  }

  function checkWinner() {
    clearHighlights();
    const val = document.getElementById('searchInput').value.trim();
    const resultEl = document.getElementById('searchResult');

    if (val.length !== 4 || !/^\d{4}$/.test(val)) {
      resultEl.style.display = 'block';
      resultEl.className = 'search-result result-none';
      resultEl.innerHTML = `<span class="result-emoji">🔢</span>전화번호 뒷 4자리를 정확히 입력해 주세요.`;
      return;
    }

    const isReview = reviewWinners.includes(val);
    const isRaffle = raffleWinners.includes(val);

    if (isReview) {
      resultEl.style.display = 'block';
      resultEl.className = 'search-result result-win-review';
      resultEl.innerHTML = `<span class="result-emoji">🏆</span><strong>축하합니다! 🎉</strong><br>성의 있는 리뷰 작성자로 선정되셨어요!<br><div class="result-prize">기프티콘 2만원권 발송 예정</div>`;
      // highlight
      document.querySelectorAll('#reviewGrid .winner-item').forEach(el => {
        if (el.dataset.phone === val) el.classList.add('highlighted-review');
      });
      document.getElementById('reviewGrid').closest('.section').scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (isRaffle) {
      resultEl.style.display = 'block';
      resultEl.className = 'search-result result-win-raffle';
      resultEl.innerHTML = `<span class="result-emoji">🎁</span><strong>축하합니다! 🎉</strong><br>랜덤 추첨 당첨자로 선정되셨어요!<br><div class="result-prize">기프티콘 5천원권 발송 예정</div>`;
      document.querySelectorAll('#raffleGrid .winner-item').forEach(el => {
        if (el.dataset.phone === val) el.classList.add('highlighted-raffle');
      });
      document.getElementById('raffleGrid').closest('.section').scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      resultEl.style.display = 'block';
      resultEl.className = 'search-result result-none';
      resultEl.innerHTML = `<span class="result-emoji">😢</span>아쉽게도 당첨되지 않으셨습니다.<br><span style="font-size:13px; font-weight:400; margin-top:4px; display:block;">이지꾸에 대한 관심과 참여에 감사드립니다 💜</span>`;
    }
  }

  document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkWinner();
  });

  // Only allow numbers
  document.getElementById('searchInput').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 4);
  });
</script>
</body>
</html>
